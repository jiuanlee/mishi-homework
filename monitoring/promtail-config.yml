server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attributes:
            tag:
      - json:
          expressions:
            tag:
          source: attributes
      - regex:
          expression: (?P<container_name>(?:[^|]*))
          source: tag
      - labels:
          tag:
          stream:
          container_name:

  - job_name: app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: applogs
          __path__: /logs/*.log

    pipeline_stages:
      - json:
          expressions:
            level:
            message:
            timestamp:
      - labels:
          level:

  - job_name: nginx_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+)'
      - labels:
          status:
